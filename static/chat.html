<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Researcher</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #new-chat {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #new-chat:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
    }

    #new-chat svg {
      width: 14px;
      height: 14px;
    }

    header span {
      color: #7c9cbf;
      font-weight: 400;
      font-size: 13px;
      margin-left: 10px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 780px;
      width: 100%;
    }

    .msg.user {
      align-self: flex-end;
    }

    .msg.assistant {
      align-self: flex-start;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      word-break: break-word;
    }

    .msg.user .bubble {
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .msg.assistant .bubble {
      background: #fff;
      color: #222;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 3px;
    }

    .msg.assistant .bubble h1,
    .msg.assistant .bubble h2,
    .msg.assistant .bubble h3 {
      margin: 10px 0 4px;
      font-size: 1em;
      font-weight: 700;
    }

    .msg.assistant .bubble p {
      margin: 6px 0;
    }

    .msg.assistant .bubble ul,
    .msg.assistant .bubble ol {
      margin: 6px 0 6px 18px;
    }

    .msg.assistant .bubble li {
      margin: 3px 0;
    }

    .msg.assistant .bubble code {
      background: #f0f0f0;
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 13px;
      font-family: monospace;
    }

    .msg.assistant .bubble pre {
      background: #f0f0f0;
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .msg.assistant .bubble pre code {
      background: none;
      padding: 0;
    }

    .msg.assistant .bubble blockquote {
      border-left: 3px solid #c5d8f0;
      margin: 6px 0;
      padding: 2px 10px;
      color: #555;
    }

    .msg.assistant .bubble hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 8px 0;
    }

    .msg.assistant .bubble a {
      color: #2c5f9e;
    }

    .tool-wrap {
      align-self: flex-start;
      max-width: 780px;
      width: 100%;
    }

    .tool-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #eef3fb;
      border: 1px solid #c5d8f0;
      color: #2c5f9e;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      margin: 4px 0;
      cursor: default;
      user-select: none;
    }

    .tool-pill.done {
      background: #edfbf1;
      border-color: #b0e5c0;
      color: #1e7a3e;
      cursor: pointer;
    }

    .tool-pill.done:hover {
      background: #d6f5e1;
    }

    .skill-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f3f0ff;
      border: 1px solid #c4b5fd;
      color: #6d28d9;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      margin: 4px 0;
      cursor: default;
      user-select: none;
    }

    .skill-pill.done {
      background: #ede9fe;
      border-color: #a78bfa;
      color: #5b21b6;
    }

    .skill-pill svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .skill-file {
      opacity: 0.65;
      font-size: 11px;
    }

    .tool-detail {
      display: none;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-top: 4px;
      font-size: 12px;
      overflow: hidden;
    }

    .tool-detail.open {
      display: block;
    }

    .tool-detail-section {
      padding: 8px 12px;
    }

    .tool-detail-section+.tool-detail-section {
      border-top: 1px solid #f0f0f0;
    }

    .tool-detail-label {
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }

    .tool-detail-body {
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.5;
    }

    .cost-badge {
      align-self: flex-start;
      font-size: 11px;
      color: #888;
      padding: 2px 8px;
      margin-top: -8px;
    }

    .tool-pill svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #c5d8f0;
      border-top-color: #2c5f9e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #form {
      border-top: 1px solid #ddd;
      background: #fff;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 140px;
      overflow-y: auto;
    }

    #input:focus {
      border-color: #1a1a2e;
    }

    #send {
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      cursor: pointer;
      align-self: flex-end;
      height: 42px;
    }

    #send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #send:hover:not(:disabled) {
      background: #2c2c4e;
    }
    /* Modal styles */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #modal {
      background: #fff;
      padding: 24px;
      border-radius: 14px;
      max-width: 380px;
      width: calc(100% - 40px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      animation: modalIn 0.2s ease-out;
    }

    @keyframes modalIn {
      from {
        transform: scale(0.95);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    #modal h3 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #1a1a2e;
    }

    #modal p {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .modal-btn {
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .modal-btn.cancel {
      background: #f0f0f0;
      border: 1px solid #ddd;
      color: #444;
    }

    .modal-btn.cancel:hover {
      background: #e5e5e5;
    }

    .modal-btn.confirm {
      background: #1a1a2e;
      color: #fff;
      border: none;
    }

    .modal-btn.confirm:hover {
      background: #2c2c4e;
    }
  </style>
</head>

<body>

  <div id="modal-overlay">
    <div id="modal">
      <h3>Chat leeren?</h3>
      <p>Möchten Sie den aktuellen Chat wirklich leeren und einen neuen beginnen? Der bisherige Verlauf wird gelöscht.</p>
      <div class="modal-buttons">
        <button class="modal-btn cancel" id="modal-cancel">Abbrechen</button>
        <button class="modal-btn confirm" id="modal-confirm">Neuer Chat</button>
      </div>
    </div>
  </div>

  <header>
    <div>
      Chat Researcher
      <span>KRG Präjudizen + OpenCaseLaw</span>
    </div>
    <button id="new-chat" type="button" title="Neuen Chat beginnen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
        <path d="M21 3v5h-5"></path>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
        <path d="M3 21v-5h5"></path>
      </svg>
      Neu
    </button>
  </header>

  <div id="messages"></div>

  <form id="form">
    <textarea id="input" rows="1" placeholder="Rechtsfrage eingeben..." autofocus></textarea>
    <button id="send" type="submit">Senden</button>
  </form>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const newChatBtn = document.getElementById("new-chat");
    const modalOverlay = document.getElementById("modal-overlay");
    const modalCancel = document.getElementById("modal-cancel");
    const modalConfirm = document.getElementById("modal-confirm");

    // Configure marked.js to open links in a new window
    marked.use({
      renderer: {
        link(token) {
          const href = token.href;
          const title = token.title;
          const text = token.text;
          return `<a href="${href}" ${title ? `title="${title}"` : ''} target="_blank" rel="noopener noreferrer">${text}</a>`;
        }
      }
    });

    // Authentication Check
    const token = localStorage.getItem('chatresearcher_token');

    // Conversation history sent with every request (stateless backend)
    let history = [];

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
    });

    // Submit on Enter (Shift+Enter = newline)
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); }
    });

    document.getElementById("form").addEventListener("submit", e => {
      e.preventDefault();
      submit();
    });

    newChatBtn.addEventListener("click", (e) => {
      e.preventDefault();
      if (messagesEl.children.length > 1) {
        modalOverlay.style.display = "flex";
      } else {
        window.location.reload();
      }
    });

    modalCancel.addEventListener("click", () => {
      modalOverlay.style.display = "none";
    });

    modalConfirm.addEventListener("click", () => {
      window.location.reload();
    });

    // Close modal on escape
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") modalOverlay.style.display = "none";
    });

    function submit() {
      const text = inputEl.value.trim();
      if (!text || sendBtn.disabled) return;
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendMessage(text);
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
      messagesEl.appendChild(div);
      scrollBottom();
      return div.querySelector(".bubble");
    }

    const TOOL_ICONS = {
      search_local_cases: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`,
      search_opencaselaw: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    };
    const TOOL_LABELS = {
      search_local_cases: "Lokale DB",
      search_opencaselaw: "OpenCaseLaw",
    };

    const SKILL_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`;

    function addSkillPill(skills, files, insertBeforeEl) {
      const wrap = document.createElement("div");
      wrap.className = "tool-wrap";

      const pill = document.createElement("div");
      pill.className = "skill-pill";

      const skillLabel = (skills && skills.length) ? skills.join(", ") : "Skill";
      const fileHtml = (files && files.length)
        ? ` <span class="skill-file">• ${escHtml(files[0])}</span>` : "";

      pill.innerHTML = SKILL_ICON
        + `<span>${escHtml(skillLabel)}</span>`
        + fileHtml
        + `<span class="spinner" style="border-color:#c4b5fd;border-top-color:#6d28d9"></span>`;
      wrap.appendChild(pill);

      if (insertBeforeEl) {
        messagesEl.insertBefore(wrap, insertBeforeEl);
      } else {
        messagesEl.appendChild(wrap);
      }
      scrollBottom();
      return pill;
    }

    function addToolWrap(name, toolInput, insertBeforeEl) {
      const wrap = document.createElement("div");
      wrap.className = "tool-wrap";

      const pill = document.createElement("div");
      pill.className = "tool-pill";
      pill.innerHTML = (TOOL_ICONS[name] || "") +
        `<span>${TOOL_LABELS[name] || name}</span>` +
        `<span class="spinner"></span>`;
      wrap.appendChild(pill);

      const detail = document.createElement("div");
      detail.className = "tool-detail";

      // Query section
      const querySection = document.createElement("div");
      querySection.className = "tool-detail-section";
      querySection.innerHTML = `<div class="tool-detail-label">Suchanfrage</div>` +
        `<div class="tool-detail-body">${escHtml(JSON.stringify(toolInput, null, 2))}</div>`;
      detail.appendChild(querySection);

      // Result section (filled later)
      const resultSection = document.createElement("div");
      resultSection.className = "tool-detail-section";
      resultSection.innerHTML = `<div class="tool-detail-label">Ergebnis</div>` +
        `<div class="tool-detail-body result-body"></div>`;
      detail.appendChild(resultSection);

      wrap.appendChild(detail);

      pill.addEventListener("click", () => {
        if (pill.classList.contains("done")) detail.classList.toggle("open");
      });

      if (insertBeforeEl) {
        messagesEl.insertBefore(wrap, insertBeforeEl);
      } else {
        messagesEl.appendChild(wrap);
      }
      scrollBottom();
      return { pill, detail };
    }

    async function sendMessage(text) {
      sendBtn.disabled = true;
      addMessage("user", text);

      // Placeholder assistant bubble
      const bubble = addMessage("assistant", "");
      const assistantMsgDiv = bubble.closest(".msg");
      bubble.textContent = "";
      let assistantText = "";

      // Track active tool wraps (name -> {pill, detail})
      const activeTools = {};
      // Track active skill pills (index -> pill element)
      const activeSkills = {};

      try {
        const res = await fetch((window.BACKEND_URL || '') + "/chat", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ messages: history, message: text }),
        });

        if (res.status === 401) {
          window.location.href = '/login';
          return;
        }

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });

          // Parse SSE lines
          const lines = buf.split("\n\n");
          buf = lines.pop(); // keep incomplete last chunk

          for (const block of lines) {
            const line = block.replace(/^data: /, "").trim();
            if (!line) continue;
            let evt;
            try { evt = JSON.parse(line); } catch { continue; }

            if (evt.type === "text") {
              assistantText += evt.content;
              bubble.innerHTML = marked.parse(assistantText);
              scrollBottom();

            } else if (evt.type === "skill_event") {
              if (evt.action === "start") {
                const pill = addSkillPill(evt.skills, evt.files, assistantMsgDiv);
                activeSkills[evt.index] = pill;
              } else if (evt.action === "done") {
                const pill = activeSkills[evt.index];
                if (pill) {
                  pill.classList.add("done");
                  pill.querySelector(".spinner")?.remove();
                  delete activeSkills[evt.index];
                }
              }

            } else if (evt.type === "tool_start") {
              const toolWrap = addToolWrap(evt.name, evt.input || {}, assistantMsgDiv);
              activeTools[evt.name] = toolWrap;

            } else if (evt.type === "tool_done") {
              const toolWrap = activeTools[evt.name];
              if (toolWrap) {
                toolWrap.pill.classList.add("done");
                toolWrap.pill.querySelector(".spinner")?.remove();
                const chevron = document.createElement("span");
                chevron.textContent = " ▾";
                toolWrap.pill.appendChild(chevron);
                if (evt.result) {
                  toolWrap.detail.querySelector(".result-body").textContent = evt.result;
                }
              }

            } else if (evt.type === "cost") {
              const badge = document.createElement("div");
              badge.className = "cost-badge";
              const cents = (evt.cost_usd * 100).toFixed(3);
              badge.textContent = `${evt.input_tokens} in / ${evt.output_tokens} out — $${evt.cost_usd.toFixed(4)} (${cents}¢)`;
              messagesEl.appendChild(badge);
              scrollBottom();

            } else if (evt.type === "done") {
              // Append to history
              history.push({ role: "user", content: text });
              history.push({ role: "assistant", content: assistantText });

            } else if (evt.type === "error") {
              bubble.innerHTML = marked.parse("**Fehler:** " + escHtml(evt.content));
            }
          }
        }
      } catch (err) {
        bubble.textContent = "Verbindungsfehler: " + err.message;
        if (err.message.includes("401")) window.location.href = '/login';
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Initial Welcome Message
    const welcomeText = `Guten Tag! Ich bin Ihr juristischer Rechercheassistent für Schweizer Strafrecht. Ich kann Sie bei folgenden Aufgaben unterstützen:

- **Lokale Datenbank:** Suche nach internen Präjudizen des Kriminalgerichts Luzern.
- **OpenCaseLaw:** Recherche in über 956'000 Entscheiden, inklusive Leitentscheiden und Zitationsanalysen.
- **Gesetze:** Abruf von Artikeln aus StGB, StPO, BV, OR und weiteren Bundesgesetzen.
- **Doktrin & Kommentare:** Zugriff auf wissenschaftliche Kommentare (OnlineKommentar.ch) und dogmatische Analysen.

Wie kann ich Ihnen heute bei Ihrer Recherche helfen?`;

    const welcomeBubble = addMessage("assistant", "");
    welcomeBubble.innerHTML = marked.parse(welcomeText);
    // Ensure the welcome message is in the history so the AI knows it sent it
    history.push({ role: "assistant", content: welcomeText });
  </script>
</body>

</html>
