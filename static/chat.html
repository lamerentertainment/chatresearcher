<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Researcher</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #new-chat {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #new-chat:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
    }

    #new-chat svg {
      width: 14px;
      height: 14px;
    }

    header span {
      color: #7c9cbf;
      font-weight: 400;
      font-size: 13px;
      margin-left: 10px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 780px;
      width: 100%;
    }

    .msg.user {
      align-self: flex-end;
    }

    .msg.assistant {
      align-self: flex-start;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      word-break: break-word;
    }

    .msg.user .bubble {
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .msg.assistant .bubble {
      background: #fff;
      color: #222;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 3px;
    }

    .intermediate-text {
      color: #777;
      font-style: italic;
      opacity: 0.85;
      margin-bottom: 12px;
    }

    .msg.assistant .bubble h1,
    .msg.assistant .bubble h2,
    .msg.assistant .bubble h3 {
      margin: 10px 0 4px;
      font-size: 1em;
      font-weight: 700;
    }

    .msg.assistant .bubble p {
      margin: 6px 0;
    }

    .msg.assistant .bubble ul,
    .msg.assistant .bubble ol {
      margin: 6px 0 6px 18px;
    }

    .msg.assistant .bubble li {
      margin: 3px 0;
    }

    .msg.assistant .bubble code {
      background: #f0f0f0;
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 13px;
      font-family: monospace;
    }

    .msg.assistant .bubble pre {
      background: #f0f0f0;
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .msg.assistant .bubble pre code {
      background: none;
      padding: 0;
    }

    .msg.assistant .bubble blockquote {
      border-left: 3px solid #c5d8f0;
      margin: 6px 0;
      padding: 2px 10px;
      color: #555;
    }

    .msg.assistant .bubble hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 8px 0;
    }

    .msg.assistant .bubble a {
      color: #2c5f9e;
    }

    .tool-wrap {
      align-self: flex-start;
      max-width: 780px;
      width: 100%;
    }

    .tool-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #eef3fb;
      border: 1px solid #c5d8f0;
      color: #2c5f9e;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      margin: 4px 0;
      cursor: default;
      user-select: none;
    }

    .tool-pill.done {
      background: #edfbf1;
      border-color: #b0e5c0;
      color: #1e7a3e;
      cursor: pointer;
    }

    .tool-pill.done:hover {
      background: #d6f5e1;
    }

    .skill-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f3f0ff;
      border: 1px solid #c4b5fd;
      color: #6d28d9;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      margin: 4px 0;
      cursor: default;
      user-select: none;
    }

    .skill-pill.done {
      background: #ede9fe;
      border-color: #a78bfa;
      color: #5b21b6;
    }

    .skill-pill svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .skill-file {
      opacity: 0.65;
      font-size: 11px;
    }

    .thinking-wrap {
      align-self: flex-start;
      max-width: 780px;
      width: 100%;
    }

    .thinking-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fdf2f8;
      border: 1px solid #fbcfe8;
      color: #be185d;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      margin: 4px 0;
      cursor: pointer;
      user-select: none;
    }

    .thinking-pill:hover {
      background: #fce7f3;
    }

    .thinking-detail {
      display: none;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-top: 4px;
      font-size: 13px;
      color: #555;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .thinking-detail.open {
      display: block;
    }

    .tool-detail {
      display: none;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-top: 4px;
      font-size: 12px;
      overflow: hidden;
    }

    .tool-detail.open {
      display: block;
    }

    .tool-detail-section {
      padding: 8px 12px;
    }

    .tool-detail-section+.tool-detail-section {
      border-top: 1px solid #f0f0f0;
    }

    .tool-detail-label {
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }

    .tool-detail-body {
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.5;
    }

    .cost-badge {
      align-self: flex-start;
      font-size: 11px;
      color: #888;
      padding: 2px 8px;
      margin-top: -8px;
    }

    .tool-pill svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #c5d8f0;
      border-top-color: #2c5f9e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #form {
      border-top: 1px solid #ddd;
      background: #fff;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      min-height: 62px;
      max-height: 140px;
      overflow-y: auto;
    }

    #input:focus {
      border-color: #1a1a2e;
    }

    #send {
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      cursor: pointer;
      align-self: flex-end;
      height: 42px;
    }

    #send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #send:hover:not(:disabled) {
      background: #2c2c4e;
    }

    /* Modal styles */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #modal {
      background: #fff;
      padding: 24px;
      border-radius: 14px;
      max-width: 380px;
      width: calc(100% - 40px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      animation: modalIn 0.2s ease-out;
    }

    @keyframes modalIn {
      from {
        transform: scale(0.95);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    #modal h3 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #1a1a2e;
    }

    #modal p {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .modal-btn {
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .modal-btn.cancel {
      background: #f0f0f0;
      border: 1px solid #ddd;
      color: #444;
    }

    .modal-btn.cancel:hover {
      background: #e5e5e5;
    }

    .modal-btn.confirm {
      background: #1a1a2e;
      color: #fff;
      border: none;
    }

    .modal-btn.confirm:hover {
      background: #2c2c4e;
    }
  </style>
</head>

<body>

  <div id="modal-overlay">
    <div id="modal">
      <h3>Chat leeren?</h3>
      <p>Möchten Sie den aktuellen Chat wirklich leeren und einen neuen beginnen? Der bisherige Verlauf wird gelöscht.
      </p>
      <div class="modal-buttons">
        <button class="modal-btn cancel" id="modal-cancel">Abbrechen</button>
        <button class="modal-btn confirm" id="modal-confirm">Neuer Chat</button>
      </div>
    </div>
  </div>

    <div style="display: flex; align-items: center; gap: 10px;">
      <select id="model-select" style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 4px 8px; border-radius: 6px; font-size: 12px; outline: none; cursor: pointer;">
        <option value="claude-sonnet-4-5" selected>Claude 3.5 Sonnet</option>
        <option value="hermes-agent">Hermes Agent (Local)</option>
        <option value="hermes-remote">Hermes Agent (Remote / Hetzner)</option>
      </select>
      <button id="new-chat" type="button" title="Neuen Chat beginnen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
          <path d="M21 3v5h-5"></path>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
          <path d="M3 21v-5h5"></path>
        </svg>
        Neu
      </button>
    </div>
  </header>

  <div id="messages"></div>

  <form id="form">
    <textarea id="input" rows="2"
      placeholder="Formuliere hier Deine Rechtsfrage... (keine VERTRAULICHEN oder GEHEIMEN Daten!)"
      autofocus></textarea>
    <button id="send" type="submit">Senden</button>
  </form>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const newChatBtn = document.getElementById("new-chat");
    const modalOverlay = document.getElementById("modal-overlay");
    const modalCancel = document.getElementById("modal-cancel");
    const modalConfirm = document.getElementById("modal-confirm");

    // Configure marked.js to open links in a new window and preserve line breaks
    marked.use({
      breaks: true,
      renderer: {
        link(token) {
          const href = token.href;
          const title = token.title;
          const text = token.text;
          return `<a href="${href}" ${title ? `title="${title}"` : ''} target="_blank" rel="noopener noreferrer">${text}</a>`;
        }
      }
    });

    // Authentication Check
    const token = localStorage.getItem('chatresearcher_token');

    // Hide model selector if Hermes is not enabled
    if (typeof window.HERMES_ENABLED !== 'undefined' && !window.HERMES_ENABLED) {
      const modelSelect = document.getElementById("model-select");
      if (modelSelect) modelSelect.style.display = "none";
    }

    // Conversation history sent with every request (stateless backend)
    let history = [];

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
    });

    // Submit on Enter (Shift+Enter = newline)
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); }
    });

    document.getElementById("form").addEventListener("submit", e => {
      e.preventDefault();
      submit();
    });

    newChatBtn.addEventListener("click", (e) => {
      e.preventDefault();
      if (messagesEl.children.length > 1) {
        modalOverlay.style.display = "flex";
      } else {
        window.location.reload();
      }
    });

    modalCancel.addEventListener("click", () => {
      modalOverlay.style.display = "none";
    });

    modalConfirm.addEventListener("click", () => {
      window.location.reload();
    });

    // Close modal on escape
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") modalOverlay.style.display = "none";
    });

    function submit() {
      const text = inputEl.value.trim();
      if (!text || sendBtn.disabled) return;
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendMessage(text);
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
      messagesEl.appendChild(div);
      scrollBottom();
      return div.querySelector(".bubble");
    }

    const TOOL_ICONS = {
      search_local_cases: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`,
      search_opencaselaw: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    };
    const TOOL_LABELS = {
      search_local_cases: "Lokale Suche",
      search_opencaselaw: "OpenCaseLaw",
      bash_code_execution: "Terminal",
      text_editor_code_execution: "Text Editor",
      search_decisions: "Entscheide suchen",
      find_leading_cases: "Leitentscheide",
      get_decision: "Entscheid",
      get_case_brief: "Case Brief",
      find_citations: "Zitationen",
      find_appeal_chain: "Instanzenzug",
      get_law: "Gesetz",
      search_laws: "Gesetze suchen",
      get_doctrine: "Doktrin",
      get_commentary: "Kommentar",
      search_commentaries: "Kommentare suchen",
      analyze_legal_trend: "Rechtstrend",
      get_praejudiz: "Präjudiz",
      list_regesten: "Regesten Übersicht"
    };

    const SKILL_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`;

    function addSkillPill(skills, files, insertBeforeEl) {
      const wrap = document.createElement("div");
      wrap.className = "tool-wrap";

      const pill = document.createElement("div");
      pill.className = "skill-pill";

      const skillLabel = (skills && skills.length) ? skills.join(", ") : "Skill";
      const fileHtml = (files && files.length)
        ? ` <span class="skill-file">• ${escHtml(files[0])}</span>` : "";

      pill.innerHTML = SKILL_ICON
        + `<span>${escHtml(skillLabel)}</span>`
        + fileHtml
        + `<span class="spinner" style="border-color:#c4b5fd;border-top-color:#6d28d9"></span>`;
      wrap.appendChild(pill);

      if (insertBeforeEl) {
        messagesEl.insertBefore(wrap, insertBeforeEl);
      } else {
        messagesEl.appendChild(wrap);
      }
      scrollBottom();
      return pill;
    }

    function addToolWrap(name, toolInput, insertBeforeEl) {
      const wrap = document.createElement("div");
      wrap.className = "tool-wrap";

      const pill = document.createElement("div");
      pill.className = "tool-pill";
      pill.innerHTML = (TOOL_ICONS[name] || `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>`) +
        `<span class="pill-label">${TOOL_LABELS[name] || name}</span>` +
        `<span class="spinner"></span>`;
      wrap.appendChild(pill);

      const detail = document.createElement("div");
      detail.className = "tool-detail";

      // Query section
      const querySection = document.createElement("div");
      querySection.className = "tool-detail-section";
      let inputStr = typeof toolInput === "string" ? toolInput : JSON.stringify(toolInput || {}, null, 2);
      if (inputStr === "{}") inputStr = "";
      querySection.innerHTML = `<div class="tool-detail-label">Suchanfrage</div>` +
        `<div class="tool-detail-body query-body">${escHtml(inputStr)}</div>`;
      detail.appendChild(querySection);

      // Result section (filled later)
      const resultSection = document.createElement("div");
      resultSection.className = "tool-detail-section";
      resultSection.innerHTML = `<div class="tool-detail-label">Ergebnis</div>` +
        `<div class="tool-detail-body result-body"></div>`;
      detail.appendChild(resultSection);

      wrap.appendChild(detail);

      pill.addEventListener("click", () => {
        if (pill.classList.contains("done")) detail.classList.toggle("open");
      });

      if (insertBeforeEl) {
        messagesEl.insertBefore(wrap, insertBeforeEl);
      } else {
        messagesEl.appendChild(wrap);
      }
      scrollBottom();
      return { pill, detail };
    }

    function addThinkingWrap(insertBeforeEl) {
      const wrap = document.createElement("div");
      wrap.className = "thinking-wrap";

      const pill = document.createElement("div");
      pill.className = "thinking-pill";

      const icon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`;

      pill.innerHTML = icon + `<span>Denkt nach…</span><span class="spinner" style="border-color:#fbcfe8;border-top-color:#be185d"></span>`;
      wrap.appendChild(pill);

      const detail = document.createElement("div");
      detail.className = "thinking-detail open";
      wrap.appendChild(detail);

      pill.addEventListener("click", () => {
        detail.classList.toggle("open");
      });

      if (insertBeforeEl) {
        messagesEl.insertBefore(wrap, insertBeforeEl);
      } else {
        messagesEl.appendChild(wrap);
      }
      scrollBottom();
      return { pill, detail };
    }

    async function sendMessage(text) {
      sendBtn.disabled = true;
      addMessage("user", text);

      // Placeholder assistant bubble
      const bubble = addMessage("assistant", "");
      const assistantMsgDiv = bubble.closest(".msg");
      bubble.textContent = "";
      let assistantText = "";
      let turns = [""];
      let expectNewTurn = false;

      // Track active tool wraps (identifier -> {pill, detail})
      const activeTools = {};
      // Track active skill pills (index -> pill element)
      const activeSkills = {};
      // Track active thinking wraps (index -> {pill, detail})
      const activeThinking = {};

      const modelSelect = document.getElementById("model-select");
      const model = modelSelect ? modelSelect.value : "claude-sonnet-4-5";

      try {
        const res = await fetch((window.BACKEND_URL || '') + "/chat", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ messages: history, message: text, model: model }),
        });

        if (res.status === 401) {
          window.location.href = '/login';
          return;
        }

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });

          // Parse SSE lines
          const lines = buf.split("\n\n");
          buf = lines.pop(); // keep incomplete last chunk

          for (const block of lines) {
            const line = block.replace(/^data: /, "").trim();
            if (!line) continue;
            let evt;
            try { evt = JSON.parse(line); } catch { continue; }

            if (evt.type === "text") {
              if (expectNewTurn) {
                turns.push("");
                expectNewTurn = false;
              }
              turns[turns.length - 1] += evt.content;
              assistantText += evt.content;

              bubble.innerHTML = turns.map((t, idx) => {
                let html = marked.parse(t);
                if (idx < turns.length - 1) {
                  return `<div class="intermediate-text">${html}</div>`;
                }
                return html;
              }).join("");
              scrollBottom();

            } else if (evt.type === "skill_event") {
              if (evt.action === "start") {
                expectNewTurn = true;
                const pill = addSkillPill(evt.skills, evt.files, assistantMsgDiv);
                activeSkills[evt.index] = pill;
              } else if (evt.action === "done") {
                const pill = activeSkills[evt.index];
                if (pill) {
                  pill.classList.add("done");
                  pill.querySelector(".spinner")?.remove();
                  // Datei-Referenz nachtragen falls vom Server erkannt
                  if (evt.files && evt.files.length) {
                    const existing = pill.querySelector(".skill-file");
                    if (!existing) {
                      const fileSpan = document.createElement("span");
                      fileSpan.className = "skill-file";
                      fileSpan.textContent = "• " + evt.files[0];
                      pill.appendChild(fileSpan);
                    }
                  }
                  delete activeSkills[evt.index];
                }
              }

            } else if (evt.type === "tool_start") {
              expectNewTurn = true;
              const toolWrap = addToolWrap(evt.name, "", assistantMsgDiv);
              toolWrap.name = evt.name;
              const toolKey = evt.index !== undefined ? evt.index : evt.name;
              activeTools[toolKey] = toolWrap;

            } else if (evt.type === "tool_input_delta") {
              const toolWrap = activeTools[evt.index];
              if (toolWrap) {
                const qb = toolWrap.detail.querySelector(".query-body");
                qb.textContent += evt.delta;

                let pillLabel = toolWrap.pill.querySelector(".pill-label");
                let textContent = qb.textContent;
                let baseLabel = TOOL_LABELS[toolWrap.name] || toolWrap.name;
                if (toolWrap.name === "bash_code_execution" || toolWrap.name === "bash") {
                  let match = textContent.match(/"command"\s*:\s*"?([^"]*)/);
                  if (match && match[1]) {
                    let cmd = match[1].replace(/\\n/g, " ").replace(/\\"/g, '"');
                    pillLabel.textContent = "Terminal: " + (cmd.length > 35 ? cmd.substring(0, 35) + '...' : cmd);
                  }
                } else if (toolWrap.name === "text_editor_code_execution" || toolWrap.name === "str_replace_editor") {
                  let cmdMatch = textContent.match(/"command"\s*:\s*"([^"]+)"/);
                  let pathMatch = textContent.match(/"path"\s*:\s*"([^"]+)/);
                  let info = "Editor";
                  if (cmdMatch && cmdMatch[1]) info += ` ${cmdMatch[1]}`;
                  if (pathMatch && pathMatch[1]) {
                    info += ` ${pathMatch[1].split('/').pop()}`;
                  }
                  pillLabel.textContent = info;
                } else {
                  let queryMatch = textContent.match(/"query"\s*:\s*"([^"]+)/) || textContent.match(/"titel"\s*:\s*"([^"]+)/);
                  if (queryMatch) {
                    let q = queryMatch[1];
                    pillLabel.textContent = baseLabel + ": " + (q.length > 30 ? q.substring(0, 30) + "..." : q);
                  } else {
                    let articleMatch = textContent.match(/"article"\s*:\s*"([^"]+)/);
                    if (articleMatch) {
                      pillLabel.textContent = baseLabel + " (Art. " + articleMatch[1] + ")";
                    }
                  }
                }
              }

            } else if (evt.type === "tool_done") {
              const toolKey = evt.index !== undefined ? evt.index : evt.name;
              const toolWrap = activeTools[toolKey];
              if (toolWrap) {
                toolWrap.pill.classList.add("done");
                toolWrap.pill.querySelector(".spinner")?.remove();
                if (!toolWrap.pill.querySelector('.chevron')) {
                  const chevron = document.createElement("span");
                  chevron.className = "chevron";
                  chevron.textContent = " ▾";
                  toolWrap.pill.appendChild(chevron);
                }
                if (evt.input) {
                  toolWrap.detail.querySelector(".query-body").textContent = typeof evt.input === "string" ? evt.input : JSON.stringify(evt.input, null, 2);

                  let pillLabel = toolWrap.pill.querySelector(".pill-label");
                  let baseLabel = TOOL_LABELS[toolWrap.name] || toolWrap.name;
                  if (toolWrap.name === "bash_code_execution" || toolWrap.name === "bash") {
                    if (evt.input.command) {
                      let cmd = evt.input.command;
                      pillLabel.textContent = "Terminal: " + (cmd.length > 35 ? cmd.substring(0, 35) + '...' : cmd);
                    }
                  } else if (toolWrap.name === "text_editor_code_execution" || toolWrap.name === "str_replace_editor") {
                    let info = "Editor";
                    if (evt.input.command) info += ` ${evt.input.command}`;
                    if (evt.input.path) info += ` ${evt.input.path.split('/').pop()}`;
                    pillLabel.textContent = info;
                  } else {
                    let info = baseLabel;
                    if (evt.input.query) info += ": " + evt.input.query;
                    else if (evt.input.titel) info += ": " + evt.input.titel;
                    else if (evt.input.article) {
                      let abbr = evt.input.abbreviation || evt.input.law_code || "";
                      info += `: ${abbr} ${evt.input.article}`.trim();
                    }
                    pillLabel.textContent = info.length > 40 ? info.substring(0, 40) + "..." : info;
                  }
                }
                if (evt.result) {
                  toolWrap.detail.querySelector(".result-body").textContent = evt.result;
                }
              }

            } else if (evt.type === "thinking_start") {
              const tWrap = addThinkingWrap(assistantMsgDiv);
              activeThinking[evt.index] = tWrap;

            } else if (evt.type === "thinking_delta") {
              const tWrap = activeThinking[evt.index];
              if (tWrap) {
                tWrap.detail.textContent += evt.delta;
                scrollBottom();
              }

            } else if (evt.type === "cost") {
              const badge = document.createElement("div");
              badge.className = "cost-badge";
              const cents = (evt.cost_usd * 100).toFixed(3);
              badge.textContent = `${evt.input_tokens} in / ${evt.output_tokens} out — $${evt.cost_usd.toFixed(4)} (${cents}¢)`;
              messagesEl.appendChild(badge);
              scrollBottom();

            } else if (evt.type === "done") {
              // Append to history
              history.push({ role: "user", content: text });
              history.push({ role: "assistant", content: assistantText });
              // Clear any leftover spinners
              assistantMsgDiv.parentElement.querySelectorAll(".spinner").forEach(e => e.remove());

            } else if (evt.type === "error") {
              bubble.innerHTML = marked.parse("**Fehler:** " + escHtml(evt.content));
            }
          }
        }
      } catch (err) {
        bubble.textContent = "Verbindungsfehler: " + err.message;
        if (err.message.includes("401")) window.location.href = '/login';
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Initial Welcome Message
    const welcomeText = `Guten Tag! Ich bin Ihr juristischer Rechercheassistent für Schweizer Strafrecht. Ich kann Sie bei folgenden Aufgaben unterstützen:

- **Lokale Datenbank:** Suche nach internen Präjudizen des Kriminalgerichts Luzern.
- **OpenCaseLaw:** Recherche in über 956'000 schweizerischen Entscheiden, inklusive Leitentscheiden und Zitationsanalysen.
- **Gesetze:** Abruf von Artikeln aus StGB, StPO, BV, OR und weiteren Bundesgesetzen.
- **Doktrin & Kommentare:** Zugriff auf wissenschaftliche Kommentare (OnlineKommentar.ch) und dogmatische Analysen.

Ich habe die **besondere Fähigkeit** (skill), basierend auf der aktuellen Rechtsprechung den KRG-Redaktionsrichtlinien entsprechende 
**Textbausteine** zu erstellen. Fordere mich auf, indem du mir zum Beispiel sagst: "Erstelle einen Textbaustein für den objektiven Tatbestand der Sachbeschädigung gemäss Art. 144 StGB". 

Wie kann ich Ihnen heute bei Ihrer Recherchearbeit helfen?`;

    const welcomeBubble = addMessage("assistant", "");
    welcomeBubble.innerHTML = marked.parse(welcomeText);
    // Ensure the welcome message is in the history so the AI knows it sent it
    history.push({ role: "assistant", content: welcomeText });
  </script>
</body>

</html>
