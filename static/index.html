<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Researcher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    header span { color: #7c9cbf; font-weight: 400; font-size: 13px; margin-left: 10px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 780px;
      width: 100%;
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.assistant .bubble {
      background: #fff;
      color: #222;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 3px;
    }

    .tool-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #eef3fb;
      border: 1px solid #c5d8f0;
      color: #2c5f9e;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      margin: 4px 0;
    }
    .tool-pill.done { background: #edfbf1; border-color: #b0e5c0; color: #1e7a3e; }
    .tool-pill svg { width: 13px; height: 13px; flex-shrink: 0; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #c5d8f0;
      border-top-color: #2c5f9e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #form {
      border-top: 1px solid #ddd;
      background: #fff;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 140px;
      overflow-y: auto;
    }
    #input:focus { border-color: #1a1a2e; }

    #send {
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      cursor: pointer;
      align-self: flex-end;
      height: 42px;
    }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
    #send:hover:not(:disabled) { background: #2c2c4e; }
  </style>
</head>
<body>

<header>
  Chat Researcher
  <span>Lokale Präjudizen + OpenCaseLaw</span>
</header>

<div id="messages"></div>

<form id="form">
  <textarea id="input" rows="1" placeholder="Rechtsfrage eingeben..." autofocus></textarea>
  <button id="send" type="submit">Senden</button>
</form>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send");

  // Conversation history sent with every request (stateless backend)
  let history = [];

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });

  // Submit on Enter (Shift+Enter = newline)
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); }
  });

  document.getElementById("form").addEventListener("submit", e => {
    e.preventDefault();
    submit();
  });

  function submit() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendMessage(text);
  }

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
    messagesEl.appendChild(div);
    scrollBottom();
    return div.querySelector(".bubble");
  }

  function addToolPill(name, done, preview) {
    const icons = {
      search_local_cases:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`,
      search_opencaselaw:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    };
    const labels = {
      search_local_cases: "Lokale DB",
      search_opencaselaw: "OpenCaseLaw",
    };

    const pill = document.createElement("div");
    pill.className = "tool-pill" + (done ? " done" : "");
    pill.innerHTML = (icons[name] || "") +
      `<span>${labels[name] || name}</span>` +
      (done ? "" : `<span class="spinner"></span>`);
    if (done && preview) pill.title = preview;

    messagesEl.appendChild(pill);
    scrollBottom();
    return pill;
  }

  async function sendMessage(text) {
    sendBtn.disabled = true;
    addMessage("user", text);

    // Placeholder assistant bubble
    const bubble = addMessage("assistant", "");
    bubble.textContent = "";
    let assistantText = "";

    // Track active tool pills (name -> pill element)
    const activePills = {};

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history, message: text }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        // Parse SSE lines
        const lines = buf.split("\n\n");
        buf = lines.pop(); // keep incomplete last chunk

        for (const block of lines) {
          const line = block.replace(/^data: /, "").trim();
          if (!line) continue;
          let evt;
          try { evt = JSON.parse(line); } catch { continue; }

          if (evt.type === "text") {
            assistantText += evt.content;
            bubble.textContent = assistantText;
            scrollBottom();

          } else if (evt.type === "tool_start") {
            const pill = addToolPill(evt.name, false);
            activePills[evt.name] = pill;

          } else if (evt.type === "tool_done") {
            const pill = activePills[evt.name];
            if (pill) {
              pill.className = "tool-pill done";
              pill.innerHTML = pill.innerHTML.replace('<span class="spinner"></span>', "");
              if (evt.preview) pill.title = evt.preview;
            }

          } else if (evt.type === "done") {
            // Append to history
            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: assistantText });

          } else if (evt.type === "error") {
            bubble.textContent = "Fehler: " + evt.content;
          }
        }
      }
    } catch (err) {
      bubble.textContent = "Verbindungsfehler: " + err.message;
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
</script>
</body>
</html>
